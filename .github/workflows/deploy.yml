name: Deploy Portfolio Vue

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy
        run: | 
          ssh -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          -p ${{ secrets.SSH_PORT }} << 'ENDSSH'

          export PATH=/usr/local/node/bin:/usr/local/bin:$PATH
          export NODE_PATH=/usr/local/node/lib/node_modules:$NODE_PATH

          git config --global --add safe.directory /www/wwwroot/renatomontanari.com.br

          cd /www/wwwroot/renatomontanari.com.br

          echo "📥 Atualizando projeto..."
          git pull origin main

          echo "📦 Instalando dependências..."
          npm ci

          echo "🏗️ Gerando build..."
          npm run build

          echo "🚀 Deploy concluído!"

          ENDSSH